<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職業安全績效管理系統 (OSPMS)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow: hidden; }
        
        .sidebar { width: 280px; flex-shrink: 0; }

        .table-container { 
            overflow: auto; 
            height: calc(100vh - 160px); 
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .sticky-col-num { position: sticky; left: 0; z-index: 25; background: #fff; min-width: 40px; text-align: center; }
        .sticky-col-name { position: sticky; left: 40px; z-index: 25; background: #fff; border-right: 2px solid #f1f5f9; min-width: 170px; }

        tr:hover .sticky-col-num, tr:hover .sticky-col-name { background-color: #f8fafc; }

        thead th { position: sticky; top: 0; z-index: 30; background: #f1f5f9; }
        thead th.sticky-col-num { z-index: 41; left: 0; }
        thead th.sticky-col-name { z-index: 40; left: 40px; }


        #main-table { table-layout: fixed; min-width: 1282px; }
        #main-table th, #main-table td { vertical-align: middle; }
        #main-table th:nth-child(1), #main-table td:nth-child(1) { width: 40px; }
        #main-table th:nth-child(2), #main-table td:nth-child(2) { width: 170px; }
        #main-table th:nth-child(3), #main-table td:nth-child(3) { width: 310px; }
        #main-table th:nth-child(4), #main-table td:nth-child(4) { width: 56px; }
        #main-table th:nth-child(5), #main-table td:nth-child(5) { width: 58px; }
        #main-table th:nth-child(n+6):nth-child(-n+17),
        #main-table td:nth-child(n+6):nth-child(-n+17) { width: 54px; }

        .input-cell { 
            width: 100%; 
            text-align: center; 
            border: 1px solid transparent; 
            border-radius: 4px; 
            padding: 3px 1px; 
            font-size: 11px; 
            transition: all 0.2s;
            background: transparent;
            color: #475569;
        }
        .input-cell:disabled { cursor: not-allowed; opacity: 1; color: #475569; }
        .input-cell:not(:disabled):hover { border-color: #cbd5e1; background: #fff; }
        .input-cell:not(:disabled):focus { border-color: #3b82f6; background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }

        .admin-edit-cell { background-color: #fefce8 !important; border: 1px dashed #eab308 !important; color: #475569 !important; }

        .year-input {
            background: #dbeafe;
            color: #1d4ed8;
            border: 2px solid transparent;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 6px;
            width: 180px;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
        }

        .attachment-btn {
            position: absolute;
            bottom: 2px;
            right: 2px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
        }
        .attachment-btn i { 
            width: 10px; 
            height: 10px; 
            stroke-width: 2.5px; 
        }
        .attachment-btn.has-file { color: #3b82f6; opacity: 1; }
        .attachment-btn.no-file { color: #d1d5db; opacity: 0.4; }
        .attachment-btn:hover { opacity: 1; transform: scale(1.2); }

        #upload-status-box.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.02);
        }

        /* 排序選單樣式 */
        .sort-menu {
            position: absolute;
            background: white;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            padding: 4px;
            z-index: 100;
            display: none;
            min-width: 120px;
        }
        .sort-menu button {
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .sort-menu button:hover { background: #f1f5f9; color: #1e293b; }
        .sort-menu button:disabled { opacity: 0.4; cursor: not-allowed; }

.system-footer-light {
    width: 100%;
    text-align: center;

    padding: 4px 0 2px 0;

    margin-top: 0px;
    margin-bottom: 4px;

    background: transparent;
}

.footer-line-light {
    width: 80px;
    height: 1px;

    margin: 0 auto 4px auto;

    background: linear-gradient(
        to right,
        transparent,
        rgba(148,163,184,.35),
        transparent
    );
}

.footer-title-light {
    color: #64748b;

    font-size: 12px;
    letter-spacing: 0.16em;

    font-weight: 700;

    margin-bottom: 8px;
}

.footer-dev-light {
    color: #3b82f6;

    font-size: 11px;

    font-style: italic;
    letter-spacing: 0.08em;
}

        @media print {
            @page { size: A4 landscape; margin: 0.7cm; }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                box-shadow: none !important;
                text-shadow: none !important;
            }

            html,
            body {
                width: auto !important;
                height: auto !important;
                min-height: auto !important;
                overflow: visible !important;
                background: #ffffff !important;
            }

            body {
                display: block !important;
                font-size: 9px !important;
                color: #0f172a !important;
            }

            .no-print,
            .sidebar,
            #admin-add-section,
            #sort-menu,
            #login-modal,
            #attachment-modal,
            #admin-header-action,
            .attachment-btn {
                display: none !important;
            }

            main,
            main.flex-1,
            main.flex,
            main.flex-col,
            body > main {
                display: block !important;
                width: 100% !important;
                min-width: 0 !important;
                height: auto !important;
                min-height: auto !important;
                overflow: visible !important;
            }

            header {
                display: block !important;
                padding: 0 0 8px 0 !important;
                margin: 0 0 8px 0 !important;
                border-bottom: 2px solid #1e293b !important;
                background: #ffffff !important;
                page-break-after: avoid !important;
            }

            #current-category-title {
                font-size: 17px !important;
                line-height: 1.25 !important;
                font-weight: 900 !important;
                color: #0f172a !important;
                margin: 0 0 4px 0 !important;
            }

            #year-input-field {
                width: auto !important;
                min-width: 120px !important;
                padding: 0 !important;
                border: 0 !important;
                background: transparent !important;
                color: #334155 !important;
                font-size: 10px !important;
                font-weight: 700 !important;
                text-align: left !important;
            }

            main > .p-4,
            .p-4.flex-1,
            .p-4.overflow-hidden,
            .flex-1.overflow-hidden {
                display: block !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                height: auto !important;
                max-height: none !important;
                overflow: visible !important;
            }

            .table-container {
                display: block !important;
                overflow: visible !important;
                height: auto !important;
                max-height: none !important;
                width: 100% !important;
                border-radius: 0 !important;
                background: #ffffff !important;
            }

            table {
                width: 100% !important;
                table-layout: fixed !important;
                border-collapse: collapse !important;
                border-spacing: 0 !important;
                font-size: 8px !important;
                line-height: 1.25 !important;
                page-break-inside: auto !important;
            }

            thead {
                display: table-header-group !important;
            }

            tbody {
                display: table-row-group !important;
            }

            tr {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                page-break-after: auto !important;
            }

            thead th,
            thead th.sticky-col-num,
            thead th.sticky-col-name,
            .sticky-col-num,
            .sticky-col-name {
                position: static !important;
                left: auto !important;
                top: auto !important;
                z-index: auto !important;
                background: #ffffff !important;
                min-width: 0 !important;
                border-right: 1px solid #cbd5e1 !important;
            }

            thead th {
                background: #e2e8f0 !important;
                color: #0f172a !important;
                font-weight: 900 !important;
                text-align: center !important;
            }

            th,
            td {
                padding: 3px 2px !important;
                border: 1px solid #cbd5e1 !important;
                vertical-align: middle !important;
                word-break: break-word !important;
                overflow-wrap: anywhere !important;
                white-space: normal !important;
            }

            td:nth-child(1), th:nth-child(1) { width: 3.5% !important; text-align: center !important; }
            td:nth-child(2), th:nth-child(2) { width: 13% !important; }
            td:nth-child(3), th:nth-child(3) { width: 25% !important; }
            td:nth-child(4), th:nth-child(4) { width: 4.5% !important; text-align: center !important; }
            td:nth-child(5), th:nth-child(5) { width: 4.5% !important; text-align: center !important; }
            td:nth-child(n+6):nth-child(-n+17),
            th:nth-child(n+6):nth-child(-n+17) { width: 4.125% !important; text-align: center !important; }

            .input-cell,
            .input-cell:disabled {
                display: block !important;
                width: 100% !important;
                min-height: 12px !important;
                padding: 0 !important;
                border: 0 !important;
                border-radius: 0 !important;
                background: transparent !important;
                color: #0f172a !important;
                font-size: 8px !important;
                line-height: 1.2 !important;
                text-align: center !important;
            }

            .admin-edit-cell,
            textarea {
                border: 0 !important;
                background: transparent !important;
                resize: none !important;
                overflow: visible !important;
            }

            .system-footer-light {
                display: block !important;
                width: 100% !important;
                margin-top: 8px !important;
                padding-top: 4px !important;
                page-break-inside: avoid !important;
                border-top: 1px solid #cbd5e1 !important;
            }

            .footer-line-light {
                display: none !important;
            }

            .footer-title-light {
                margin-bottom: 2px !important;
                font-size: 8px !important;
                color: #64748b !important;
                letter-spacing: 0.08em !important;
            }

            .footer-dev-light {
                font-size: 7px !important;
                color: #64748b !important;
            }
        }
    </style>
</head>
<body class="text-slate-800 flex h-screen">

    <aside class="sidebar bg-slate-900 flex flex-col no-print">
        <div class="p-6 border-b border-slate-800">
            <div class="flex justify-between items-start">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500 p-2 rounded-xl">
                        <i data-lucide="shield-check" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-base font-black text-white tracking-tight leading-none">職業安全績效管理系統</h1>
                        <p class="text-[9px] text-blue-400 font-bold uppercase tracking-tighter mt-1">Occupational Safety Performance Management System</p>
                    </div>
                </div>
                <button id="admin-toggle-btn" onclick="handleAuthClick()" class="text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="lock" class="w-5 h-5" id="auth-icon"></i>
                </button>
            </div>
            <p class="text-[12px] text-slate-300 font-bold mt-4"></p>
        </div>
        
        <nav class="flex-1 py-6 overflow-y-auto">
            <div class="px-6 mb-4">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">系統分類目錄</span>
            </div>
            <div class="space-y-1" id="nav-tabs"></div>
        </nav>

        <div class="p-4 bg-slate-800/30 space-y-2">
            <div id="admin-badge" class="hidden px-4 py-2 bg-yellow-500/10 border border-yellow-500/20 rounded-lg mb-2">
                <p class="text-[10px] text-yellow-500 font-bold text-center">管理員編輯模式</p>
            </div>
            
            <div class="grid grid-cols-2 gap-2 mb-2">
                <button onclick="exportJSON()" class="bg-slate-700 text-slate-200 py-2 rounded-lg text-[11px] font-bold flex items-center justify-center space-x-1 hover:bg-slate-600 transition">
                    <i data-lucide="upload" class="w-3 h-3"></i><span>導出數據</span>
                </button>
                <button onclick="document.getElementById('import-input').click()" class="bg-slate-700 text-slate-200 py-2 rounded-lg text-[11px] font-bold flex items-center justify-center space-x-1 hover:bg-slate-600 transition">
                    <i data-lucide="download" class="w-3 h-3"></i><span>導入數據</span>
                </button>
                <input type="file" id="import-input" class="hidden" accept=".json" onchange="importJSON(this)">
            </div>

            <button class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-bold flex items-center justify-center space-x-2 hover:bg-blue-500 transition" onclick="exportFullReport()">
                <i data-lucide="file-up" class="w-4 h-4"></i><span>匯出全年度績效報表 (Excel)</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-white px-8 py-5 border-b border-slate-200 flex justify-between items-center shrink-0">
            <div>
                <h2 id="current-category-title" class="text-xl font-black text-slate-900 tracking-tight leading-none">載入中...</h2>
                <div class="flex items-center mt-2">
                    <input type="text" id="year-input-field" class="year-input" value="2026年度 (115年)" 
                           onclick="this.select()" 
                           onblur="handleYearFormat(this)"
                           onkeydown="if(event.key === 'Enter') handleYearFormat(this)">
                </div>
            </div>
            <div class="flex items-center space-x-3 no-print">
                <button id="save-logout-btn" onclick="saveAndLogout()" class="hidden flex items-center space-x-2 px-5 py-2.5 bg-green-600 text-white rounded-full text-sm font-bold transition shadow-sm hover:bg-green-700">
                    <i data-lucide="save" class="w-4 h-4"></i><span>儲存並登出系統</span>
                </button>
                <button onclick="printCurrentReport()" class="flex items-center space-x-2 px-5 py-2.5 bg-white border border-slate-200 rounded-full text-sm font-bold text-slate-700 transition shadow-sm hover:shadow-md">
                    <i data-lucide="printer" class="w-4 h-4 text-slate-600"></i><span>列印報告</span>
                </button>
            </div>
        </header>

        <div class="p-4 flex-1 overflow-hidden flex flex-col">
            <div class="table-container">
                <table class="w-full text-left border-separate border-spacing-0" id="main-table">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                            <th class="px-2 py-4 sticky-col-num border-b">編號</th>
                            <th class="px-3 py-3 sticky-col-name border-b">績效指標內容</th>
                            <th class="px-3 py-3 min-w-[310px] border-b border-l">計算方式</th>
                            <th class="px-1.5 py-3 text-center min-w-[56px] border-b border-l">時程規劃</th>
                            <th class="px-1.5 py-3 text-center min-w-[58px] border-b border-l">目標值</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">1月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">2月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">3月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">4月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">5月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">6月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">7月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">8月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">9月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">10月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">11月</th>
                            <th class="px-1 py-3 text-center border-b border-l bg-blue-50/30 text-blue-600 min-w-[54px]">12月</th>
                            <th id="admin-header-action" class="hidden px-2 py-4 text-center border-b border-l text-red-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="bg-white"></tbody>
                </table>
            </div>
            <div id="admin-add-section" class="hidden mt-4">
                <button onclick="addNewRow()" class="flex items-center space-x-2 px-4 py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg hover:bg-blue-50 transition font-bold text-sm">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span>新增績效指標項目</span>
                </button>
            </div>
        </div>
<footer class="system-footer-light">

    <div class="footer-line-light"></div>

    <p class="footer-title-light">
        © 2026 職業安全衛生室｜職業安全績效管理系統
    </p>

    <p class="footer-dev-light">
        Developed by Sam Sun
    </p>

</footer>  
    </main>

    <!-- 排序選單 -->
    <div id="sort-menu" class="sort-menu no-print">
        <button id="move-up-btn" onclick="moveRow('up')"><i data-lucide="arrow-up" class="w-3 h-3 inline mr-2"></i>上移項目</button>
        <button id="move-down-btn" onclick="moveRow('down')"><i data-lucide="arrow-down" class="w-3 h-3 inline mr-2"></i>下移項目</button>
    </div>

    <!-- 管理員驗證彈窗 -->
    <div id="login-modal" onclick="closeLoginModalOutside(event)" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()" class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-200">
            <div class="p-8">
                <div id="login-view">
                    <div class="flex flex-col items-center text-center mb-6">
                        <div class="bg-slate-100 p-3 rounded-full mb-4">
                            <i data-lucide="lock-keyhole" class="w-8 h-8 text-slate-600"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-900">管理員權限驗證</h3>
                        <p class="text-sm text-slate-500 mt-1">請輸入系統存取密碼以解鎖編輯欄位</p>
                    </div>
                    <div class="space-y-4">
                        <input type="password" id="login-password" 
                               class="w-full px-4 py-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 transition outline-none text-center text-xl tracking-[0.5em]" 
                               placeholder="••••"
                               onkeyup="if(event.key === 'Enter') attemptLogin()">
                        <div class="flex space-x-2">
                            <button onclick="closeLoginModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition text-sm">取消</button>
                            <button onclick="attemptLogin()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition text-sm">解鎖編輯</button>
                        </div>
                        <button onclick="togglePasswordView(true)" class="w-full text-xs text-slate-400 hover:text-blue-500 transition py-1">需要修改管理密碼？</button>
                        <p id="login-error" class="text-center text-red-500 text-xs font-bold hidden">密碼錯誤，請重新輸入</p>
                    </div>
                </div>

                <div id="change-pwd-view" class="hidden">
                    <div class="flex flex-col items-center text-center mb-6">
                        <div class="bg-yellow-50 p-3 rounded-full mb-4">
                            <i data-lucide="key-round" class="w-8 h-8 text-yellow-600"></i>
                        </div>
                        <h3 class="text-xl font-black text-slate-900">修改管理密碼</h3>
                        <p class="text-sm text-slate-500 mt-1">需先輸入舊密碼驗證身份</p>
                    </div>
                    <div class="space-y-3">
                        <input type="password" id="old-password" class="w-full px-4 py-2 bg-slate-100 border-none rounded-lg focus:ring-2 focus:ring-blue-500 transition outline-none text-sm" placeholder="目前的密碼">
                        <input type="password" id="new-password" class="w-full px-4 py-2 bg-slate-100 border-none rounded-lg focus:ring-2 focus:ring-blue-500 transition outline-none text-sm" placeholder="設定新密碼">
                        <div class="flex space-x-2 pt-2">
                            <button onclick="togglePasswordView(false)" class="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold hover:bg-slate-200 transition text-xs">返回</button>
                            <button onclick="handleChangePassword()" class="flex-1 py-2 bg-yellow-500 text-white rounded-lg font-bold hover:bg-yellow-600 transition text-xs">確認修改</button>
                        </div>
                        <p id="pwd-change-error" class="text-center text-red-500 text-[10px] font-bold hidden"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 附件管理彈窗 -->
    <div id="attachment-modal" onclick="closeAttachmentModalOutside(event)" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden flex items-center justify-center p-4">
        <div onclick="event.stopPropagation()" class="bg-white w-full max-w-[440px] max-h-[90vh] rounded-[2.5rem] shadow-2xl overflow-y-auto p-8 relative animate-in fade-in zoom-in duration-200">
            <button onclick="closeAttachmentModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 transition">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
            <div class="flex items-center space-x-3 mb-6">
                <i data-lucide="link" class="w-6 h-6 text-blue-600 rotate-45"></i>
                <h3 id="attachment-modal-title" class="text-xl font-bold text-slate-800 tracking-tight">附件與快速填充</h3>
            </div>
            <div class="mb-6">
                <label class="text-[12px] font-bold text-slate-400 mb-2 block">目前選擇</label>
                <div class="bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 flex justify-between items-center">
                    <span id="target-label-display" class="text-slate-700 font-medium">載入中...</span>
                    <button id="delete-single-attachment-btn" onclick="deleteSingleAttachment()" class="hidden text-red-400 hover:text-red-600 transition p-1" title="刪除此筆附件">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="mb-8">
                <label class="text-[12px] font-bold text-slate-400 mb-2 block">連結電腦 PDF / PNG / JPG 檔案</label>
                <div class="flex items-center space-x-3">
                    <div id="upload-status-box" 
                         onclick="document.getElementById('file-input').click()"
                         class="flex-1 border-2 border-dashed border-blue-200 bg-blue-50/30 rounded-2xl py-5 px-4 flex items-center justify-center space-x-2 cursor-pointer hover:bg-blue-50 transition group relative">
                        <i id="upload-icon-status" data-lucide="cloud-upload" class="w-5 h-5 text-blue-500"></i>
                        <span id="upload-text-status" class="text-blue-600 font-bold text-sm">點擊或拖移檔案至此</span>
                    </div>
                    <button onclick="viewCurrentFile()" id="view-file-btn" class="hidden h-[60px] w-[60px] flex items-center justify-center bg-slate-50 border border-slate-100 rounded-2xl text-slate-400 hover:text-blue-600 transition">
                        <i data-lucide="external-link" class="w-6 h-6"></i>
                    </button>
                </div>
                <input type="file" id="file-input" class="hidden" accept=".pdf,.png,.jpg,.jpeg" multiple onchange="handleFileUpload(this)">
                <div id="attachment-file-list" class="mt-3 space-y-2 max-h-[260px] overflow-y-auto pr-1"></div>
            </div>
            <hr id="attachment-admin-divider" class="border-slate-100 mb-6">
            <div id="attachment-admin-tools" class="mb-8">
                <label class="text-[12px] font-bold text-slate-400 mb-3 block">快速大量填充 (批次操作)</label>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="batchApplyToFile()" class="bg-[#1e293b] text-white py-3.5 rounded-xl text-[13px] font-bold hover:bg-slate-700 transition">
                        將此檔案套用全年度
                    </button>
                    <button onclick="batchClearRowAttachments()" class="bg-[#fff1f2] text-[#f43f5e] py-3.5 rounded-xl text-[13px] font-bold hover:bg-red-100 transition border border-red-50">
                        清除此指標所有附件
                    </button>
                </div>
            </div>
            <button onclick="closeAttachmentModal()" class="w-full py-4 bg-[#2563eb] text-white rounded-[1.2rem] font-bold text-base shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition">
                完成並關閉
            </button>
        </div>
    </div>

    <script>
        // 初始數據定義
        let appData = {
            plan: [
                { id: "1", name: "工作場所巡視結果符合率", content: "巡視結果符合率% =〔1-(缺點件數 / 總件數) 〕x100%", schedule: "適時", target: "90%" },
                { id: "2", name: "職業安全衛生教育訓練", content: "新進人員到職後實施實施3小時安全衛生教育訓練。", schedule: "適時", target: "100%" },
                { id: "3", name: "職業安全衛生委員會或管審會", content: "依職業安全衛生管理辦法第12條規定，職業安全衛生委員會(以下簡稱委員會)應每3個月至少開會1次，辦理審議、協調及建議安全衛生相關事項。", schedule: "季", target: "100%" },
                { id: "4", name: "職業安全衛生工作守則", content: "依職業安全衛生法相關規定，應訂定職業安全衛生工作守則，並經公告及勞動檢查機構備查；其內容應適時檢討與修訂，並確保員工知悉與遵守。", schedule: "適時", target: "100%" },
                { id: "5", name: "安衛相關建議提案改善件數", content: "提案改善率% = 〔1-(逾期件數 / 總件數) 〕x100 %", schedule: "適時", target: "90%" },
                { id: "6", name: "虛驚事故", content: "虛驚事件改善率% = 〔1-(逾期件數 / 總件數) 〕x100%", schedule: "適時", target: "100%" },
                { id: "7", name: "職災事件", content: "職災事件改善率% = 〔1-(逾期件數 / 總件數) 〕x100%", schedule: "適時", target: "100%" },
                { id: "8", name: "職災事故調查", content: "職災事故調查完成率% = 〔1-(逾期未完成調查件數 / 職災事故總件數) 〕x100%", schedule: "適時", target: "100%" },
                { id: "9", name: "安衛證照設置符合率", content: "環安衛證照設置符合率 = 實際證照數 / 法令規定證照數 x100%", schedule: "適時", target: "100%" },
                { id: "10", name: "人員證照相關", content: "協助同仁於證照有效期限滿前辦理回訓報名", schedule: "適時", target: "100%" },
                { id: "11", name: "安全衛生緊急應變計畫演練", content: "為鑑別可能發生之災害事故或緊急狀況，因應、防止、或降低此類事件所可能造成的人員傷害、財產損失與工作環境影響，定期規劃實施。", schedule: "年", target: "100%" },
                { id: "12", name: "消防防護計畫", content: "一定規模以上之建築物，應由管理權人，遴用防火管理人，責其製定消防防護計畫，報請消防機關核備，並依該計畫執行有關防火管理上必要之業務。 地下建築物或中央主管機關指定之建築物 ，其管理權有分屬時，各管理權人應協議製定共同消防防護計畫，並報請消防機關核備。", schedule: "月", target: "100%" },
                { id: "13", name: "自動檢查計畫", content: "依職業安全衛生法第 23 條及職業安全衛生管理辦法第 79 條規定，定期更新安全衛生自動檢查計畫。", schedule: "月", target: "100%" },
                { id: "14", name: "作業安全管理", content: "高風險作業現場安全查核符合率﹪＝（現場查核符合件數 / 總抽查件數）×100﹪", schedule: "月", target: "100%" },
                { id: "15", name: "變更管理風險評估", content: "變更管理 (MOC) 風險評估完成率﹪＝（已完成風險評估之變更案 / 總變更申請案）×100﹪", schedule: "適時", target: "100%" },
                { id: "16", name: "安衛自動檢查檢核符合率", content: "安衛自動檢查檢核符合率 = 累積合格單位數/受檢單位數x100%", schedule: "適時", target: "90%" },
                { id: "17", name: "定期實施一般健康檢查", content: "雇主對在職勞工，應依下列規定，定期實施一般健康檢查： 一、年滿六十五歲者，每年檢查一次。 二、四十歲以上未滿六十五歲者，每三年檢查一次。· 三、未滿四十歲者，每五年檢查一次。", schedule: "年", target: "100%" },
                { id: "18", name: "特殊作業人員檢查計畫", content: "雇主使勞工從事第二條規定之特別危害健康作業，應每年或於變更其作業時，依第十六條附表十所定項目，實施特殊健康檢查。", schedule: "年", target: "100%" },
                { id: "19", name: "員工健康風險評估", content: "針對特殊作業人員，安排年度特檢並追蹤異常指標，防止職業病發生。", schedule: "年", target: "100%" },
                { id: "20", name: "辦理臨場醫護諮詢服務", content: "事業單位勞工人數在五十人以上未達三百人者，應視其規模及性質，依規定每年實施4-6次，特約醫護人員臨場諮詢服務，服務時並不直接執行醫療行為。", schedule: "適時", target: "100%" },
                { id: "21", name: "危害性化學品清單及SDS安全資料表", content: "製造者、輸入者、供應者或雇主，應依實際狀況檢討安全資料表內容之正確性，適時更新，並至少每三年檢討一次。 前項安全資料表更新之內容、日期、版次等更新紀錄，應保存三年。", schedule: "月", target: "100%" },
                { id: "22", name: "安全作業標準", content: "依職業安全衛生施行細則第31條規定，應擬訂安全衛生作業標準並定期更新，且依標準程序進行作業。", schedule: "月", target: "100%" },
                { id: "23", name: "有機溶劑儲藏室危險區域劃分", content: "定期更新危險區域劃分平面圖等資料供主管機關核備", schedule: "季", target: "100%" },
                { id: "24", name: "承攬、採購、變更管理", content: "依職業安全衛生法施行細則第三十一條規定，執行工作環境或作業危害之辨識、評估及控制、採購管理、承攬管理、變更管理與緊急應變措施等職業安全衛生事項。", schedule: "適時", target: "100%" },
                { id: "25", name: "承攬商違規改善追蹤", content: "承攬商違規改善追蹤率﹪＝（承攬商違規已改善件數 / 總違規件數）×100﹪", schedule: "適時", target: "100%" },
                { id: "26", name: "主管機關函文公告", content: "將主管機關函文公告並通報。", schedule: "適時", target: "100%" }
            ],
            iso: [
                { id: "1", name: "職安風險評估作業盤查", content: "依ISO 45001安全衛生法規及職業安全衛生管理系統相關規範等要求，建立、實施及維持風險評估管理計畫。", schedule: "適時", target: "100%" },
                { id: "2", name: "職安風險與機會評估", content: "依ISO 45001安全衛生法規及職業安全衛生管理系統相關規範等要求，執行工作環境或作業危害的辨識與控制。", schedule: "適時", target: "100%" },
                { id: "3", name: "職業安全衛生法規鑑別", content: "依法規要求職安承辦人員應定期每月執行法規鑑別一次，以評估適用法規之符合性。", schedule: "月", target: "100%" },
                { id: "4", name: "職業安全衛生相關管理文件", content: "依職業安全衛生相關法規及ISO 45001管理系統要求，建立、維護及管制職業安全衛生相關文件與紀錄，確保文件經適當審查、核准、發行、修訂及保存，並定期檢討其適用性與有效性。", schedule: "適時", target: "100%" },
                { id: "5", name: "勞工參與及諮詢機制", content: "依職業安全衛生法及ISO 45001管理系統要求，建立勞工參與及諮詢機制，使勞工或其代表能參與職業安全衛生政策、風險評估、事故調查及改善措施等相關事項之討論，並提供意見回饋，且確保其參與過程之適當紀錄與追蹤。", schedule: "適時", target: "100%" },
                { id: "6", name: "職業安全績效指標量測", content: "依規定執行職業安全衛生管理計畫之查(稽)核與績效，予以量測職業安全衛生工作推動之成效。", schedule: "適時", target: "100%" },
                { id: "7", name: "職安管理系統管理審查報告", content: "依ISO 45001職業安全衛生管理系統規定將職業安全衛生相關執行事項紀錄於管理審查報告中。", schedule: "適時", target: "100%" },
                { id: "8", name: "ISO45001內外部稽核", content: "定期執行ISO 45001職業安全衛生管理系統之驗證審查。", schedule: "年", target: "100%" }
            ],
            protect: [
                { id: "1", name: "人因性危害預防計畫", content: "依去年度健康檢查報告分析肌肉骨骼之傷病調查與管控追蹤紀錄。", schedule: "年", target: "100%" },
                { id: "2", name: "異常工作負荷促發疾病預防", content: "依異常工作負荷風險評估對照表，評估工作負荷量是否造成員工過勞。", schedule: "年", target: "100%" },
                { id: "3", name: "執行職務遭受不法侵害預防", content: "依職場不法侵害預防措施查核及評估表以及主管層級職場不法侵害行為自我檢視檢核表調查是否有發生職場暴利之情事。", schedule: "年", target: "100%" },
                { id: "4", name: "母性健康保護計畫", content: "依法規定使妊娠中的員工在分娩後，在工作獲致合法合理的安置與管理。", schedule: "年", target: "100%" }
            ],
            passive: [
                { id: "1", name: "失能災害頻率 (FR)", content: "失能災害頻率（FR）＝失能傷害人次數×1,000,000 / 總經歷工時", schedule: "適時", target: "<0.79" },
                { id: "2", name: "失能災害嚴重率 (SR)", content: "失能災害嚴重率（SR）＝總失能損失日數×1,000,000 / 總經歷工時", schedule: "適時", target: "<32" }
            ],
            monitor: [
                { id: "1", name: "作業環境監測計畫", content: "每半年委託監測機構，執行作業環境監測(有機溶劑揮發/二氧化碳/噪音/照度)。", schedule: "半年", target: "100%" },
                { id: "2", name: "作業環境監測申報", content: "每半年於作業環境監測規劃實施前須先向當地主管機關進行核備作業。", schedule: "半年", target: "100%" },
                { id: "3", name: "職業災害定期申報", content: "每月10號前向人事單位索取整體工時，於工作者安全衛生履歷智能雲線上系統完成申報作業。", schedule: "月", target: "100%" },
                { id: "4", name: "單位及人員設置報備", content: "每月於工作者安全衛生履歷智能雲線上申報確認核備之人員。", schedule: "月", target: "100%" },
                { id: "5", name: "急救箱定期檢查", content: "依勞工健康保護規則第15條規定，急救藥品與器材，應置於適當固定處所及保持清潔，至少每六個月定期檢查。 對於被污染或失效之物品，應隨時予以更換及補充。", schedule: "月", target: "100%" },
                { id: "6", name: "AED自動體外心臟去顫器檢查", content: "依訂定之年度自動檢查計畫實施AED自動體外心臟去顫器檢查並紀錄備查。", schedule: "月", target: "100%" },
                { id: "7", name: "化學品進出使用量統計", content: "紀錄有機溶劑進出使用量予以核算空汙申報量之統計。", schedule: "月", target: "100%" },
                { id: "8", name: "危險物有害物分級管理申報", content: "雇主使勞工製造、處置或使用之化學品，符合國家標準CNS15030化學品分類，具有健康危害者，應評估其危害及暴露程度，劃分風險等級，並採取對應之分級管理措施。", schedule: "月", target: "100%" },
                { id: "9", name: "高風險作業許可管理", content: "依職業安全衛生相關法規規定，對於動火、受限空間、高處作業等高風險作業，應於作業前完成申請、審查及必要之通報或申報程序，並經核准後始得作業。", schedule: "適時", target: "100%" },
                { id: "10", name: "幅射防護實化申報", content: "所有輻射設備的申請、使用、異動變更、停用以及狀態查詢，都必須透過輻防雲化系統進行電子化申辦及查詢。", schedule: "月", target: "100%" },
                { id: "11", name: "空汙定期申報", content: "空汙定期申報，溶劑變更主動回報，確認100%合格。", schedule: "季", target: "100%" },
                { id: "12", name: "汙水定期申報", content: "生活廢水及下水道使用申報，確認100%合格。", schedule: "半年", target: "100%" },
                { id: "13", name: "土壤及地下汙水申報", content: "土壤及地下汙水定期申報，確認100%合格", schedule: "月", target: "100%" },
                { id: "14", name: "緊急發電機設備檢查", content: "依法規規定應每月定期實施檢查及試運轉一次，檢查內容如下：一、本體與固定螺栓有無損傷鬆動、環境通風及雜物清理。二、燃油(需80%以上)、機油與冷卻水之液位及滲漏檢查。三、蓄電池電壓、液位、接頭狀態及充電機功能。四、儀表指示、ATS 選鈕位置及相關電氣迴路確認。五、實施空載試運轉，確認運轉異音、震動及電壓頻率穩定性。", schedule: "月", target: "100%" },
                { id: "15", name: "防爆電氣設備檢查", content: "依法規規定應每月依下列規定定期實施檢查一次，檢查內容：一、本體有無損傷、變形。二、配管、配線等有無損傷、變形及異常狀況。三、其他保持防爆性能之必要事項。", schedule: "月", target: "100%" },
                { id: "16", name: "局部排氣裝置檢查", content: "雇主對局部排氣裝置、空氣清淨裝置及吹吸型換氣裝置應每年依下列規定定期實施檢查一次： 一、氣罩、導管及排氣機之磨損、腐蝕、凹凸及其他損害之狀況及程度。 二、導管或排氣機之塵埃聚積狀況。 三、排氣機之注油潤滑狀況。", schedule: "年", target: "100%" },

const DB_NAME = "OSPMS_DB";
const DB_VERSION = 1;
const STORE_KEY = "main_data";

const DEFAULT_ADMIN_PASSWORD = "1068";
const MASTER_RECOVERY_CODE = "SAM-SUN-CORE-RECOVERY";

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_KEY)) db.createObjectStore(STORE_KEY);
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject("DB Open Error");
            });
        }

        async function loadFromStorage() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_KEY, "readonly");
                const store = transaction.objectStore(STORE_KEY);
                const getRequest = (key) => new Promise((res) => {
                    const req = store.get(key);
                    req.onsuccess = () => res(req.result);
                });
                const savedData = await getRequest('ospms_data_store');
                if (savedData) tableDataStore = savedData;
                const savedAttach = await getRequest('ospms_attachments');
                if (savedAttach) attachmentsStore = savedAttach;
                const savedBaseData = await getRequest('ospms_base_data');
                if (savedBaseData) Object.keys(savedBaseData).forEach(k => { if(appData[k]) appData[k] = savedBaseData[k]; });
                initNav(); 
                switchTab('plan');
                initDragAndDrop();
            } catch (err) {
                console.error("Load Error:", err);
                initNav(); 
                switchTab('plan');
            }
        }

        async function persistToStorage() {
            try {
                const db = await openDB();
                const transaction = db.transaction(STORE_KEY, "readwrite");
                const store = transaction.objectStore(STORE_KEY);
                store.put(tableDataStore, 'ospms_data_store');
                store.put(attachmentsStore, 'ospms_attachments');
                store.put(appData, 'ospms_base_data');
                return new Promise((resolve) => { transaction.oncomplete = () => resolve(); });
            } catch (err) { console.error("Save Error:", err); }
        }

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {

                    tableDataStore = imported.data_store || {};

                    appData = imported.base_data || appData;
                    await persistToStorage();

            };
            reader.readAsText(file);

function getCategoryStats(key) {
    const baseInfo = appData[key] || [];
    const savedValues = tableDataStore[key] || [];

    let filledValidMonthCount = 0;
    let notApplicableCount = 0;
    const totalMonthCells = baseInfo.length * 12;

    baseInfo.forEach((item, idx) => {
        const rowSaved = savedValues[idx] || [];

        for (let i = 2; i <= 13; i++) {
            const rawValue = rowSaved[i];
            const value = rawValue === undefined || rawValue === null
                ? ""
                : String(rawValue).trim().toUpperCase();

            if (value === "N/A" || value === "NA") {
                notApplicableCount++;
            } else if (value !== "") {
                filledValidMonthCount++;
            }
        }
    });

    const executableMonthCells = totalMonthCells - notApplicableCount;

    const rate = executableMonthCells > 0
        ? Math.round((filledValidMonthCount / executableMonthCells) * 100)
        : 0;

    return {
        itemCount: baseInfo.length,
        totalMonthCells,
        notApplicableCount,
        executableMonthCells,
        filledValidMonthCount,
        rate
    };
}

                    ? ""

                } else if (value !== "") {
                    filledValidMonthCount++;

        const executableMonthCells = totalMonthCells - notApplicableCount;

            emptyCount,

        }

            e: { r: totalRows - 1, c: totalCols - 1 }
        })
    };

        // --- 排序功能邏輯 ---

        function toggleSortMenu(e, idx) {
            e.stopPropagation();
            const menu = document.getElementById('sort-menu');
            activeSortRowIdx = idx;
            
            // 檢查是否為第一條或最後一條，若是則禁用對應按鈕
            const list = appData[currentTab];
            document.getElementById('move-up-btn').disabled = (idx === 0);
            document.getElementById('move-down-btn').disabled = (idx === list.length - 1);

            menu.style.display = 'block';
            menu.style.left = `${e.pageX}px`;
            menu.style.top = `${e.pageY}px`;

            // 點擊外面自動關閉
            const closeMenu = () => { menu.style.display = 'none'; document.removeEventListener('click', closeMenu); };
            setTimeout(() => document.addEventListener('click', closeMenu), 0);
        }

        async function moveRow(direction) {
            if (activeSortRowIdx === null) return;
            
            // 排序前先儲存目前的輸入值到 Store
            saveCurrentTabData();
            
            const targetIdx = direction === 'up' ? activeSortRowIdx - 1 : activeSortRowIdx + 1;
            const list = appData[currentTab];
            const dataStoreList = tableDataStore[currentTab] || [];
            const attachStoreList = attachmentsStore[currentTab] || {};

            if (targetIdx < 0 || targetIdx >= list.length) return;

            // 1. 交換基礎數據 (appData)
            const tempBase = list[activeSortRowIdx];
            list[activeSortRowIdx] = list[targetIdx];
            list[targetIdx] = tempBase;

            // 2. 交換輸入內容數據 (tableDataStore)
            if (dataStoreList.length > 0) {
                const tempVal = dataStoreList[activeSortRowIdx];
                dataStoreList[activeSortRowIdx] = dataStoreList[targetIdx];
                dataStoreList[targetIdx] = tempVal;
            }

            // 3. 交換附件數據 (attachmentsStore)
            const tempAttach = attachStoreList[activeSortRowIdx];
            if (attachStoreList[targetIdx]) {
                attachStoreList[activeSortRowIdx] = attachStoreList[targetIdx];
            } else {
                delete attachStoreList[activeSortRowIdx];
            }
            if (tempAttach) {
                attachStoreList[targetIdx] = tempAttach;
            } else {
                delete attachStoreList[targetIdx];
            }

            // 更新排序標記並持久化
            activeSortRowIdx = null;
            await persistToStorage();
            
            // 重新渲染畫面
            renderTable(currentTab);
        }

        function getAttachmentFiles(slot) {
            if (!slot) return [];
            return Array.isArray(slot) ? slot : [slot];
        }

        function ensureAttachmentSlot(row, month) {
            if (!attachmentsStore[currentTab]) attachmentsStore[currentTab] = {};
            if (!attachmentsStore[currentTab][row]) attachmentsStore[currentTab][row] = {};
            if (!Array.isArray(attachmentsStore[currentTab][row][month])) {
                attachmentsStore[currentTab][row][month] = getAttachmentFiles(attachmentsStore[currentTab][row][month]);
            }
            return attachmentsStore[currentTab][row][month];
        }

        async function removeAttachmentFile(fileIndex) {
            if (!activeAttachmentTarget || !isAdmin) return;
            const files = ensureAttachmentSlot(activeAttachmentTarget.row, activeAttachmentTarget.month);
            if (fileIndex < 0 || fileIndex >= files.length) return;
            if (!confirm('確定移除此檔案？')) return;
            files.splice(fileIndex, 1);
            if (files.length === 0 && attachmentsStore[currentTab]?.[activeAttachmentTarget.row]) {
                delete attachmentsStore[currentTab][activeAttachmentTarget.row][activeAttachmentTarget.month];
                if (Object.keys(attachmentsStore[currentTab][activeAttachmentTarget.row]).length === 0) delete attachmentsStore[currentTab][activeAttachmentTarget.row];
            }
            saveCurrentTabData();
            await persistToStorage();
            renderTable(currentTab);
            openAttachmentModal(activeAttachmentTarget.row, activeAttachmentTarget.month);
        }

            lucide.createIcons();
        }

        function closeAttachmentModal() { document.getElementById('attachment-modal').classList.add('hidden'); document.getElementById('file-input').value = ''; activeAttachmentTarget = null; }
        function closeAttachmentModalOutside(event) { closeAttachmentModal(); }

        function initDragAndDrop() {
            const dropZone = document.getElementById('upload-status-box');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, e => { e.preventDefault(); e.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(name => dropZone.addEventListener(name, () => dropZone.classList.add('drag-over'), false));
            ['dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, () => dropZone.classList.remove('drag-over'), false));
            dropZone.addEventListener('drop', e => { const files = Array.from(e.dataTransfer.files || []); if (files.length > 0) processFiles(files); }, false);
        }

        function processFiles(files) {
            if (!activeAttachmentTarget) return;
            const validFiles = Array.from(files || []);
            if (validFiles.length === 0) return;
            const allowed = ['application/pdf', 'image/png', 'image/jpeg', 'image/jpg'];
            const tooLarge = validFiles.find(file => file.size > 10 * 1024 * 1024);
            const unsupported = validFiles.find(file => !allowed.includes(file.type));
            if (unsupported) { alert("不支援此格式！"); return; }
            if (tooLarge) { alert("檔案太大 (單檔限 10MB)"); return; }

            Promise.all(validFiles.map(file => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve({ name: file.name, type: file.type, data: e.target.result });
                reader.readAsDataURL(file);
            }))).then(async newFiles => {
                const slot = ensureAttachmentSlot(activeAttachmentTarget.row, activeAttachmentTarget.month);
                slot.push(...newFiles);
                saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); openAttachmentModal(activeAttachmentTarget.row, activeAttachmentTarget.month);
            });
        }

        function processFile(file) { processFiles([file]); }
        function handleFileUpload(input) { processFiles(input.files); }
        function viewFileDirectly(file) {
            const win = window.open();
            if (file.type === 'application/pdf') win.document.write(`<iframe src="${file.data}" frameborder="0" style="position:fixed; top:0; left:0; width:100%; height:100%;" allowfullscreen></iframe>`); 
            else win.document.write(`<div style="background:#f1f5f9; min-height:100vh; display:flex; justify-content:center; align-items:center;"><img src="${file.data}" style="max-width:90%; box-shadow:0 20px 25px -5px rgba(0,0,0,0.1);"></div>`); 
        }
        function viewCurrentFile() { const files = getAttachmentFiles(attachmentsStore[currentTab]?.[activeAttachmentTarget.row]?.[activeAttachmentTarget.month]); if (files.length > 0) viewFileDirectly(files[0]); }

        async function deleteSingleAttachment() {
            if (!activeAttachmentTarget || !confirm("確定刪除此月份全部附件？")) return;
            if (attachmentsStore[currentTab]?.[activeAttachmentTarget.row]) {
                delete attachmentsStore[currentTab][activeAttachmentTarget.row][activeAttachmentTarget.month];
                if (Object.keys(attachmentsStore[currentTab][activeAttachmentTarget.row]).length === 0) delete attachmentsStore[currentTab][activeAttachmentTarget.row];
                saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); openAttachmentModal(activeAttachmentTarget.row, activeAttachmentTarget.month);
            }
        }

        async function batchApplyToFile() {
            const files = getAttachmentFiles(attachmentsStore[currentTab]?.[activeAttachmentTarget.row]?.[activeAttachmentTarget.month]);
            if (!files.length) { alert("請先上傳檔案"); return; }
            if (!confirm("確定套用全年度？")) return;
            if (!attachmentsStore[currentTab][activeAttachmentTarget.row]) attachmentsStore[currentTab][activeAttachmentTarget.row] = {};
            for (let i = 1; i <= 12; i++) attachmentsStore[currentTab][activeAttachmentTarget.row][i] = files.map(f => ({ ...f }));
            saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); alert("套用成功");
        }

        async function batchClearRowAttachments() {
            if (!confirm("確定清除全年度？")) return;
            if (attachmentsStore[currentTab]?.[activeAttachmentTarget.row]) { delete attachmentsStore[currentTab][activeAttachmentTarget.row]; saveCurrentTabData(); await persistToStorage(); renderTable(currentTab); if (activeAttachmentTarget) openAttachmentModal(activeAttachmentTarget.row, activeAttachmentTarget.month); }
        }

        // --- 核心邏輯與 UI 互動 ---

        function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px'; }

        function handleAuthClick() {
            if (isAdmin) { if (confirm("退出管理模式？")) { isAdmin = false; updateUIState(); renderTable(currentTab); } } 
            else { openLoginModal(); }
        }

        function openLoginModal() { document.getElementById('login-modal').classList.remove('hidden'); togglePasswordView(false); document.getElementById('login-password').focus(); }
        function closeLoginModal() { document.getElementById('login-modal').classList.add('hidden'); document.getElementById('login-password').value = ''; }
        function closeLoginModalOutside(event) {
    closeLoginModal();
}
        function togglePasswordView(s) {
            const lV = document.getElementById('login-view'); const cV = document.getElementById('change-pwd-view');
            if (s) { lV.classList.add('hidden'); cV.classList.remove('hidden'); } else { lV.classList.remove('hidden'); cV.classList.add('hidden'); }
        }

        function getAdminPassword() {
    return localStorage.getItem('ospms_admin_pwd') || DEFAULT_ADMIN_PASSWORD;
}

function attemptLogin() {
    const inputPwd = document.getElementById('login-password').value;

    if (inputPwd === MASTER_RECOVERY_CODE) {
        localStorage.setItem('ospms_admin_pwd', DEFAULT_ADMIN_PASSWORD);

        isAdmin = false;
        updateUIState();
        closeLoginModal();

        document.getElementById('login-error').classList.add('hidden');
        alert("管理員設定已恢復，請重新登入後再修改新密碼。");
        return;
    }

    if (inputPwd === getAdminPassword()) {
        isAdmin = true;
        updateUIState();
        closeLoginModal();
        renderTable(currentTab);
    } else {
        document.getElementById('login-error').classList.remove('hidden');
    }
}

        function handleChangePassword() {
            const old = document.getElementById('old-password').value; const newP = document.getElementById('new-password').value; const err = document.getElementById('pwd-change-error');
            err.classList.add('hidden'); if (old !== getAdminPassword()) { err.innerText = "舊密碼不正確"; err.classList.remove('hidden'); return; }
            if (newP.length < 4) { err.innerText = "至少 4 位數"; err.classList.remove('hidden'); return; }
            localStorage.setItem('ospms_admin_pwd', newP); alert("修改成功"); togglePasswordView(false);
        }

        function updateUIState() {
            const icon = document.getElementById('auth-icon'); const badge = document.getElementById('admin-badge');
            if (isAdmin) { icon.setAttribute('data-lucide', 'unlock'); icon.classList.replace('text-slate-500', 'text-orange-500'); badge.classList.remove('hidden'); } 
            else { icon.setAttribute('data-lucide', 'lock'); icon.classList.replace('text-orange-500', 'text-slate-500'); badge.classList.add('hidden'); }
            lucide.createIcons();
        }

        async function saveAndLogout() { saveCurrentTabData(); await persistToStorage(); isAdmin = false; updateUIState(); renderTable(currentTab); alert("已儲存並登出"); }

        function addNewRow() { saveCurrentTabData(); appData[currentTab].push({ id: (appData[currentTab].length + 1).toString(), name: "新項目", content: "內容描述", schedule: "適時", target: "100%" }); renderTable(currentTab); }
        async function deleteRow(idx) { if (confirm("確定刪除？")) { saveCurrentTabData(); appData[currentTab].splice(idx, 1); if (attachmentsStore[currentTab]?.[idx]) delete attachmentsStore[currentTab][idx]; await persistToStorage(); renderTable(currentTab); } }

        function handleYearFormat(input) {
            let val = input.value.trim(); let match = val.match(/\d+/);
            if (match) { let y = parseInt(match[0]); if (y > 1911) input.value = `${y}年度 (${y - 1911}年)`; else input.value = `${y + 1911}年度 (${y}年)`; }
        }

        function appendPercentage(input) {
            let v = input.value.trim();
            if (v !== "" && v !== "-" && v !== "N/A" && !isNaN(v)) { input.value = v + "%"; formatInput(input); }
        }

        function handleInputChange(input) {
            let val = input.value.trim(); if (val.toUpperCase() === 'N') input.value = 'N/A';
            formatInput(input);
        }

        function formatInput(input) { input.style.color = '#475569'; }

        function handleKeyDown(e, input) {
            const cell = input.parentElement; const row = cell.parentElement; const tbody = row.parentElement; const cells = Array.from(row.cells); const rows = Array.from(tbody.rows);
            const rIdx = rows.indexOf(row); const cIdx = cells.indexOf(cell);
            if (e.key === "Enter" || e.key === "ArrowDown") { e.preventDefault(); if (rIdx < rows.length - 1) rows[rIdx + 1].cells[cIdx].querySelector('input')?.focus(); } 
            else if (e.key === "ArrowUp") { e.preventDefault(); if (rIdx > 0) rows[rIdx - 1].cells[cIdx].querySelector('input')?.focus(); }
            else if (e.key === "ArrowRight") { if (input.selectionStart === input.value.length && cIdx < cells.length - 1) { const next = cells[cIdx + 1].querySelector('input'); if (next) { e.preventDefault(); next.focus(); next.select(); } } }
            else if (e.key === "ArrowLeft") { if (input.selectionStart === 0 && cIdx > 0) { const prev = cells[cIdx - 1].querySelector('input'); if (prev) { e.preventDefault(); prev.focus(); prev.select(); } } }
        }


        function preparePrintLayout() {
            saveCurrentTabData();
            document.body.classList.add('ospms-printing');
        }

        function cleanupPrintLayout() {
            document.body.classList.remove('ospms-printing');
        }

        function printCurrentReport() {
            preparePrintLayout();
            setTimeout(() => window.print(), 50);
        }

        window.addEventListener('beforeprint', preparePrintLayout);
        window.addEventListener('afterprint', cleanupPrintLayout);

document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        closeLoginModal();
        closeAttachmentModal();
    }
});        

        window.onload = () => { loadFromStorage(); };
    </script>
